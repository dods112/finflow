<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow — Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030712; }
    </style>
</head>
<body class="min-h-screen bg-gray-950 flex items-center justify-center px-6">
    <div class="text-center max-w-xs">
        <div class="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M12 12h.01M8.464 15.536a5 5 0 010-7.072M5.636 18.364a9 9 0 010-12.728"/>
            </svg>
        </div>
        <h1 class="text-xl font-bold text-white mb-2">You're Offline</h1>
        <p class="text-gray-400 text-sm mb-6">
            FinFlow needs an internet connection to sync your financial data.
            Please check your connection and try again.
        </p>
        <button onclick="window.location.reload()"
            class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-6 py-3 rounded-xl transition-colors">
            Try Again
        </button>
    </div>
</body>
</html>
